name: release

on:
  push:
    tags:
      - "v*"
      - "V*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Derive image name
        id: image
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          repo_name="$(basename "$GITHUB_REPOSITORY")"
          repo_name="${repo_name,,}"
          echo "name=ghcr.io/${owner}/${repo_name}" >> "$GITHUB_OUTPUT"

      - name: Classify release tag
        id: tag_kind
        env:
          IMAGE_TAG: ${{ github.ref_name }}
        run: |
          if [[ "$IMAGE_TAG" =~ ^[vV][0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "publish_latest=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish_latest=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push image
        env:
          IMAGE_NAME: ${{ steps.image.outputs.name }}
          IMAGE_TAG: ${{ github.ref_name }}
        run: |
          TAG_ARGS=(-t "${IMAGE_NAME}:${IMAGE_TAG}")
          if [[ "${{ steps.tag_kind.outputs.publish_latest }}" == "true" ]]; then
            TAG_ARGS+=(-t "${IMAGE_NAME}:latest")
          fi

          docker buildx build \
            --push \
            --platform linux/amd64,linux/arm64 \
            -f docker/Dockerfile \
            "${TAG_ARGS[@]}" \
            .
