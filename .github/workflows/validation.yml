name: ci-validation

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

env:
  CI_PYTHON_VERSION: "3.13"
  PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.ms-playwright

jobs:
  security-audit:
    runs-on: ubuntu-latest
    env:
      UV_PROJECT_ENVIRONMENT: ${{ github.workspace }}/.venv
      UV_LINK_MODE: copy
      UV_COMPILE_BYTECODE: "1"
      UV_CACHE_DIR: ./.uv-cache
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install npm dependencies from lockfile
        run: npm ci

      - name: Audit npm dependencies (high+)
        run: npm audit --audit-level=high

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.CI_PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v2

      - name: Sync Python dependencies
        working-directory: docker
        env:
          UV_PROJECT_ENVIRONMENT: ${{ env.UV_PROJECT_ENVIRONMENT }}
        run: uv sync --frozen --all-extras --no-install-project

      - name: Audit Python dependencies
        run: uv tool run --from pip-audit pip-audit --progress-spinner=off

  validation:
    needs: security-audit
    runs-on: ubuntu-latest
    env:
      UV_PROJECT_ENVIRONMENT: ${{ github.workspace }}/.venv
      UV_LINK_MODE: copy
      UV_COMPILE_BYTECODE: "1"
      UV_CACHE_DIR: ./.uv-cache
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check root markdown allowlist
        run: |
          allowed='^(AGENTS|README|RELEASE_NOTES|THIRD_PARTY_NOTICES)\.md$'
          unexpected="$(find . -maxdepth 1 -type f -name '*.md' -printf '%f\n' | grep -Ev "$allowed" || true)"
          if [ -n "$unexpected" ]; then
            echo "Unexpected root markdown files:"
            echo "$unexpected"
            echo
            echo "Move planning/design notes into docs/ or remove them before merge."
            exit 1
          fi

      - name: Prepare container-style paths
        run: |
          if [ -e /app ]; then
            sudo rm -rf /app
          fi
          sudo ln -s "$GITHUB_WORKSPACE" /app
          sudo mkdir -p /app/system /app/data
          sudo chown -R "$USER":"$USER" /app/system /app/data

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.CI_PYTHON_VERSION }}

      - name: Seed validation secrets
        run: |
          python scripts/seed_ci_secrets.py --output system/secrets.yaml
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          LIBRECHAT_API_KEY: ${{ secrets.LIBRECHAT_API_KEY }}

      - name: Verify seeded secrets file
        run: |
          if [ ! -f system/secrets.yaml ]; then
            echo "system/secrets.yaml missing"
            exit 1
          fi
          python - <<'PY'
          from pathlib import Path

          path = Path("system/secrets.yaml")
          keys = []
          if path.exists():
              for line in path.read_text().splitlines():
                  if ":" in line:
                      key = line.split(":", 1)[0].strip()
                      if key:
                          keys.append(key)
          print("System secrets keys:", sorted(keys))
          PY

      - name: Check vault mutation routing
        run: python scripts/check_vault_mutation_routing.py

      - name: Install uv
        uses: astral-sh/setup-uv@v2

      - name: Sync dependencies
        working-directory: docker
        env:
          UV_PROJECT_ENVIRONMENT: ${{ env.UV_PROJECT_ENVIRONMENT }}
        run: uv sync --frozen --all-extras --no-install-project

      - name: Install Playwright Chromium
        run: ${{ env.UV_PROJECT_ENVIRONMENT }}/bin/python -m playwright install --with-deps chromium

      - name: Run validation scenarios (integration suite)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          LIBRECHAT_API_KEY: ${{ secrets.LIBRECHAT_API_KEY }}
        run: |
          ${{ env.UV_PROJECT_ENVIRONMENT }}/bin/python validation/run_validation.py run integration

      - name: Upload validation artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: validation-runs
          path: validation/runs
